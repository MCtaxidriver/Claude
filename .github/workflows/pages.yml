name: Deploy Netzwerktopologie auf GitHub Pages

on:
  push:
    branches:
      - claude/fervent-davinci-tverll
    paths:
      - "docs/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages (aktiviert Pages bei Bedarf)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Artifact (Ordner docs)
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
